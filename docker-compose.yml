services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DOCKER_HOST: tcp://executor-dind:2375
    volumes:
      - .:/workspace
    depends_on:
      - ollama
      - executor-dind

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  executor-dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind_data:/var/lib/docker

volumes:
  ollama_data:
  dind_data:
